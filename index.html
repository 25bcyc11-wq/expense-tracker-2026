<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker 2026</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>☕ Expense Tracker 2026</h1>

<!-- DASHBOARD -->
<div class="dashboard">
  <div>Current: ₹<span id="currentTotal">0</span></div>
  <div>Previous: ₹<span id="prevTotal">0</span></div>
  <div id="comparison"></div>
</div>

<!-- CALENDAR -->
<div class="calendar-controls">
  <button onclick="prevMonth()">◀</button>
  <h2 id="monthYear"></h2>
  <button onclick="nextMonth()">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<!-- EXPENSE -->
<div class="expense-box">
  <h3 id="selectedDate">Select a date</h3>

  <input type="text" id="name" placeholder="Expense Name">
  <input type="number" id="amount" placeholder="Amount">

  <select id="category">
    <option value="🍔 Food">🍔 Food</option>
    <option value="🚌 Transport">🚌 Transport</option>
    <option value="🛍 Shopping">🛍 Shopping</option>
    <option value="💡 Bills">💡 Bills</option>
    <option value="🎮 Entertainment">🎮 Entertainment</option>
    <option value="💸 Other">💸 Other</option>
  </select>

  <button onclick="addExpense()">Add Expense</button>

  <ul id="expenseList"></ul>
</div>

<!-- GRAPH -->
<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>


</body>
</html>
